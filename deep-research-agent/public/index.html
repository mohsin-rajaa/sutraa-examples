<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Research Agent — @sutraa/sdk × deepagents</title>
  <style>
    :root {
      --bg: #0c0f16;
      --panel: #141a24;
      --ink: #eaf0f7;
      --muted: #8b96a8;
      --accent: #7dd3fc;
      --accent-ink: #06202e;
      --pro: #f2a24a;
      --free: #46c07a;
      --tool: #a78bfa;
      --line: #26303f;
      --shadow: 0 12px 44px rgba(0,0,0,.45);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f3f6fb; --panel: #fff; --ink: #131924; --muted: #5d6a7d;
        --accent: #0e79b2; --accent-ink: #fff; --pro: #d98324; --free: #2f9e5f;
        --tool: #6d4bd8; --line: #e5eaf1; --shadow: 0 12px 44px rgba(30,40,70,.09);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
      font-family: ui-sans-serif, "Segoe UI", -apple-system, system-ui, sans-serif;
      display: flex; align-items: flex-start; justify-content: center; padding: 24px;
    }
    .app { width: 100%; max-width: 680px; background: var(--panel); border: 1px solid var(--line);
      border-radius: 20px; box-shadow: var(--shadow); padding: 26px; }
    h1 { font-size: 20px; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
    .sub { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
    .sub code { color: var(--accent); }

    .tenants { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .tenant { border: 2px solid var(--line); background: var(--bg); color: var(--ink);
      border-radius: 12px; padding: 12px; cursor: pointer; text-align: left; font-family: inherit;
      display: flex; flex-direction: column; gap: 5px; }
    .tenant.active { border-color: var(--accent); }
    .tenant .badge { align-self: flex-start; font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; padding: 3px 8px; border-radius: 999px; color: #fff; }
    .badge.pro { background: var(--pro); } .badge.free { background: var(--free); }
    .tenant .t { font-weight: 700; font-size: 13px; }
    .tenant .d { font-size: 11.5px; color: var(--muted); }

    textarea { width: 100%; resize: vertical; min-height: 64px; background: var(--bg); color: var(--ink);
      border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 14.5px;
      font-family: inherit; outline: none; }
    textarea:focus { border-color: var(--accent); }
    .examples { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 14px; }
    .chip { font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line);
      background: transparent; color: var(--muted); cursor: pointer; }
    .chip:hover { color: var(--accent); border-color: var(--accent); }

    button.go { border: none; background: var(--accent); color: var(--accent-ink); border-radius: 10px;
      padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
    button.go:disabled { opacity: .55; cursor: default; }

    .status { margin-top: 14px; font-size: 12.5px; color: var(--muted); min-height: 18px; }
    .spinner { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--line);
      border-top-color: var(--accent); animation: spin .7s linear infinite; display: inline-block; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .trace { margin-top: 16px; display: none; flex-direction: column; gap: 10px; }
    .step { border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; background: var(--bg); font-size: 13.5px; }
    .step .h { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700;
      margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .step.tool_call .h { color: var(--tool); }
    .step.tool_result .h { color: var(--muted); }
    .step.answer { border-color: var(--accent); }
    .step.answer .h { color: var(--accent); }
    .step .body { white-space: pre-wrap; line-height: 1.5; word-break: break-word; }
    .step .body a { color: var(--accent); }
    .note { margin-top: 12px; font-size: 12.5px; padding: 10px 12px; border-radius: 10px;
      background: rgba(242,162,74,.12); color: var(--pro); border: 1px solid rgba(242,162,74,.3); display: none; }

    footer { margin-top: 22px; text-align: center; font-size: 11.5px; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="app">
    <h1>🔎 Deep Research Agent</h1>
    <p class="sub">A <code>deepagents</code> agent whose brain and web-search tool are both <code>@sutraa/sdk</code>.</p>

    <div class="tenants" id="tenants"></div>

    <textarea id="q" placeholder="Ask a research question…"></textarea>
    <div class="examples" id="examples"></div>
    <button class="go" id="go">Run the agent</button>

    <div class="status" id="status"></div>
    <div class="note" id="note"></div>
    <div class="trace" id="trace"></div>

    <footer>powered by <a href="https://www.npmjs.com/package/@sutraa/sdk" target="_blank" rel="noopener">@sutraa/sdk</a> · <a href="https://www.npmjs.com/package/deepagents" target="_blank" rel="noopener">deepagents</a></footer>
  </div>

  <script>
    const TENANTS = [
      { id: "pro", plan: "pro", name: "Pro workspace", desc: "API key — full multi-step agent" },
      { id: "free", plan: "free", name: "Free workspace", desc: "keyless — degrades on limits" },
    ];
    const EXAMPLES = [
      "What are the latest features in the React 19 release?",
      "Summarize recent developments in small language models.",
      "What is LangGraph and what is it used for?",
    ];
    let selected = "pro";

    const tenantsEl = document.getElementById("tenants");
    const qEl = document.getElementById("q");
    const goBtn = document.getElementById("go");
    const statusEl = document.getElementById("status");
    const noteEl = document.getElementById("note");
    const traceEl = document.getElementById("trace");
    const examplesEl = document.getElementById("examples");

    function renderTenants() {
      tenantsEl.innerHTML = "";
      TENANTS.forEach((t) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tenant" + (t.id === selected ? " active" : "");
        b.innerHTML = `<span class="badge ${t.plan}">${t.plan}</span><span class="t">${t.name}</span><span class="d">${t.desc}</span>`;
        b.onclick = () => { selected = t.id; renderTenants(); };
        tenantsEl.appendChild(b);
      });
    }
    renderTenants();

    EXAMPLES.forEach((ex) => {
      const c = document.createElement("button");
      c.type = "button"; c.className = "chip"; c.textContent = ex.length > 40 ? ex.slice(0, 40) + "…" : ex;
      c.title = ex; c.onclick = () => { qEl.value = ex; qEl.focus(); };
      examplesEl.appendChild(c);
    });

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
    function linkify(s) {
      return esc(s).replace(/(https?:\/\/[^\s)]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    }

    function renderStep(step) {
      const el = document.createElement("div");
      el.className = "step " + step.kind;
      if (step.kind === "tool_call") {
        el.innerHTML = `<div class="h">🔧 ${esc(step.name)}</div><div class="body">${esc(JSON.stringify(step.args))}</div>`;
      } else if (step.kind === "tool_result") {
        el.innerHTML = `<div class="h">📄 ${esc(step.name)} result</div><div class="body">${linkify(step.content)}</div>`;
      } else if (step.kind === "answer") {
        el.innerHTML = `<div class="h">✅ answer</div><div class="body">${linkify(step.content)}</div>`;
      }
      return el;
    }

    goBtn.addEventListener("click", async () => {
      const question = qEl.value.trim();
      if (!question) { statusEl.textContent = "Enter a question first."; return; }
      goBtn.disabled = true;
      traceEl.style.display = "none"; traceEl.innerHTML = "";
      noteEl.style.display = "none";
      statusEl.innerHTML = '<span class="spinner"></span> the agent is planning, searching, and reasoning… (this can take ~30–50s)';

      try {
        const res = await fetch("/api/research", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ tenantId: selected, question }),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.innerHTML = `<span style="color:#e05252">error: ${esc(data.error || "run failed")}${data.code ? " (" + data.code + ")" : ""}</span>`;
          return;
        }
        statusEl.textContent = `${data.tenantName} · ${data.plan} · ${data.steps.length} step${data.steps.length === 1 ? "" : "s"}`;
        (data.steps || []).forEach((s) => traceEl.appendChild(renderStep(s)));
        if (!data.steps?.length && !data.note) traceEl.appendChild(renderStep({ kind: "answer", content: data.answer || "(no output)" }));
        traceEl.style.display = "flex";
        if (data.note) { noteEl.textContent = data.note; noteEl.style.display = "block"; }
      } catch (e) {
        statusEl.innerHTML = '<span style="color:#e05252">Couldn\'t reach the agent.</span>';
      } finally {
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
